name: Release APK Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup RenPy Android Build Environment
        id: setup
        uses: ./.github/actions/setup-renpy-android
        with:
          renpy-version: "8.3.4"
          cache-suffix: "v1"

      - name: Set version from tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          else
            VERSION="1.0.0"
          fi
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Building version $VERSION (code $VERSION_CODE)"

      - name: Inject version into game
        run: |
          sed -i "s/define config.version = .*/define config.version = \"${VERSION}\"/" game/system/options.rpy
          grep "config.version" game/system/options.rpy

      - name: Compile game scripts
        working-directory: ${{ steps.setup.outputs.sdk-dir }}
        run: |
          lib/py3-linux-x86_64/python renpy.py ${{ github.workspace }} compile

      - name: Prepare build directory
        working-directory: ${{ steps.setup.outputs.sdk-dir }}
        run: |
          rm -rf build_dir
          mkdir -p build_dir
          cp -r renpy build_dir/
          cp -r lib build_dir/
          cp -r ${{ github.workspace }}/game build_dir/
          cp renpy.py build_dir/ 2>/dev/null || true
          rm -rf build_dir/private build_dir/assets 2>/dev/null || true

      - name: Generate keystore
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/android.keystore
          else
            keytool -genkey -v -keystore ${{ github.workspace }}/android.keystore \
              -alias release -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass "$KS_PASS" -keypass "$KS_PASS" \
              -dname "CN=TheCampusHeaven, OU=WhiteMoon, O=WhiteMoon, L=BJ, ST=BJ, C=CN"
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'Zhang0319.' }}

      - name: Build Release APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export SDL_VIDEODRIVER=dummy
          export SDL_AUDIODRIVER=dummy
          export JAVA_TOOL_OPTIONS="-Xmx5g"
          ${{ steps.setup.outputs.sdk-dir }}/lib/py3-linux-x86_64/python scripts/build_apk.py \
            --workspace "${{ github.workspace }}" \
            --sdk-dir "${{ steps.setup.outputs.sdk-dir }}" \
            --version "$VERSION" \
            --version-code "$VERSION_CODE" \
            --ks-path "${{ github.workspace }}/android.keystore" \
            --ks-pass "$KS_PASS" \
            --ks-alias "$KS_ALIAS" \
            --key-pass "$KEY_PASS"
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'Zhang0319.' }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS || 'release' }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD || 'Zhang0319.' }}

      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find "${{ steps.setup.outputs.sdk-dir }}/rapt" -name "*.apk" -type f | head -1)
          APK_NAME="TheCampusHeaven-${VERSION}.apk"
          cp "$APK_PATH" "$APK_NAME"
          rm -f app-release.apk app-debug.apk 2>/dev/null || true
          echo "path=$APK_NAME" >> $GITHUB_OUTPUT
          echo "name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Install git-cliff
        if: startsWith(github.ref, 'refs/tags/')
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate Changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git-cliff --current --strip header -o CHANGELOG.md || true
          if [ ! -s CHANGELOG.md ]; then
            echo "## 更新内容" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "^${{ github.ref_name }}$" | tail -1)
            if [ -z "$PREV_TAG" ]; then
              git log --pretty=format:"- %s" --reverse >> CHANGELOG.md
            else
              git log "${PREV_TAG}..${{ github.ref_name }}" --pretty=format:"- %s" --reverse >> CHANGELOG.md
            fi
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          body_path: CHANGELOG.md
          name: "v${{ env.VERSION }}"
          tag_name: ${{ github.ref_name }}
