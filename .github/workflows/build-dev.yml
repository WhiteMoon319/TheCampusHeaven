name: Dev APK Build

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup RenPy Android Build Environment
        id: setup
        uses: ./.github/actions/setup-renpy-android
        with:
          renpy-version: "8.3.4"
          cache-suffix: "v1"

      - name: Set dev version
        run: |
          VERSION=$(git describe --tags --always | sed 's/^v//')
          sed -i "s/define config.version = .*/define config.version = \"${VERSION}\"/" game/options.rpy
          grep "config.version" game/options.rpy
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Compile game scripts
        working-directory: ${{ steps.setup.outputs.sdk-dir }}
        run: |
          lib/py3-linux-x86_64/python renpy.py ${{ github.workspace }} compile

      - name: Prepare build directory
        working-directory: ${{ steps.setup.outputs.sdk-dir }}
        run: |
          rm -rf build_dir
          mkdir -p build_dir
          cp -r renpy build_dir/
          cp -r lib build_dir/
          cp -r ${{ github.workspace }}/game build_dir/
          cp renpy.py build_dir/ 2>/dev/null || true
          rm -rf build_dir/private build_dir/assets 2>/dev/null || true

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore ${{ github.workspace }}/android.keystore \
            -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug, OU=Android, O=Unknown, L=Unknown, S=Unknown, C=US"

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export SDL_VIDEODRIVER=dummy
          export SDL_AUDIODRIVER=dummy
          export JAVA_TOOL_OPTIONS="-Xmx5g"
          ${{ steps.setup.outputs.sdk-dir }}/lib/py3-linux-x86_64/python scripts/build_apk.py \
            --workspace "${{ github.workspace }}" \
            --sdk-dir "${{ steps.setup.outputs.sdk-dir }}" \
            --version "$VERSION" \
            --version-code "$(git rev-list --count HEAD)" \
            --ks-path "${{ github.workspace }}/android.keystore" \
            --ks-pass android \
            --ks-alias android \
            --key-pass android

      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find "${{ steps.setup.outputs.sdk-dir }}/rapt" -name "*.apk" -type f | head -1)
          cp "$APK_PATH" "app-debug.apk"
          echo "path=app-debug.apk" >> $GITHUB_OUTPUT
          echo "name=app-debug.apk" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: warn
