name: 'Setup RenPy Android Build Environment'
description: 'Sets up JDK, Android SDK, RenPy SDK, and applies required patches'
inputs:
  renpy-version:
    description: 'RenPy SDK version'
    required: false
    default: '8.3.4'
  cache-suffix:
    description: 'Cache key suffix for cache busting'
    required: false
    default: 'v1'
outputs:
  sdk-dir:
    description: 'Path to the RenPy SDK directory'
    value: 'renpy-${{ inputs.renpy-version }}-sdk'

runs:
  using: 'composite'
  steps:
    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-35 build-tools;35.0.0'

    - name: Accept Android SDK Licenses
      shell: bash
      run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-renpy-${{ inputs.renpy-version }}-${{ inputs.cache-suffix }}
        restore-keys: gradle-${{ runner.os }}-renpy-${{ inputs.renpy-version }}-

    - name: Cache RenPy SDK + Rapt
      id: cache-renpy
      uses: actions/cache@v4
      with:
        path: renpy-${{ inputs.renpy-version }}-sdk
        key: renpy-${{ inputs.renpy-version }}-${{ runner.os }}-${{ inputs.cache-suffix }}

    - name: Download RenPy SDK
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      shell: bash
      run: |
        wget -q "https://www.renpy.org/dl/${{ inputs.renpy-version }}/renpy-${{ inputs.renpy-version }}-sdk.tar.bz2"
        tar -xjf renpy-${{ inputs.renpy-version }}-sdk.tar.bz2

    - name: Download and Extract Rapt
      if: steps.cache-renpy.outputs.cache-hit != 'true'
      shell: bash
      run: |
        wget -q "https://www.renpy.org/dl/${{ inputs.renpy-version }}/renpy-${{ inputs.renpy-version }}-rapt.zip"
        unzip -q renpy-${{ inputs.renpy-version }}-rapt.zip -d renpy-${{ inputs.renpy-version }}-sdk

    - name: Patch rapt build.py
      shell: bash
      run: |
        SDK="renpy-${{ inputs.renpy-version }}-sdk"
        if ! grep -q 'if config.numeric_version <= 1:' "$SDK/rapt/buildlib/rapt/build.py"; then
          sed -i 's/config.numeric_version = max(int(time.time()), int(config.numeric_version))/if config.numeric_version <= 1: &/' \
            "$SDK/rapt/buildlib/rapt/build.py"
        fi

    - name: Patch SDLActivity.java
      shell: bash
      run: |
        SDK="renpy-${{ inputs.renpy-version }}-sdk"
        FOUND=$(find "$SDK/rapt" -name "SDLActivity.java" -type f)
        if [ -z "$FOUND" ]; then
          echo "ERROR: SDLActivity.java not found!"
          exit 1
        fi
        for SDL_FILE in $FOUND; do
          echo "Patching: $SDL_FILE"
          sed -i 's/TYPE_TEXT_VARIATION_VISIBLE_PASSWORD/TYPE_TEXT_VARIATION_NORMAL/' "$SDL_FILE"
          sed -i '/outAttrs\.imeOptions = EditorInfo\.IME_FLAG_NO_EXTRACT_UI/{N;s/| EditorInfo\.IME_FLAG_NO_FULLSCREEN[^;]*;/| EditorInfo.IME_FLAG_NO_FULLSCREEN | EditorInfo.IME_ACTION_DONE;/}' "$SDL_FILE"
          grep -n "inputType\|imeOptions" "$SDL_FILE"
        done
